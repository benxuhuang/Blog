<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes 客製化工作流</title>
  <desc id="desc">封面插圖：看板、更新回灌、備份分支與發佈流程的技術示意。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="50%" stop-color="#101f38"/>
      <stop offset="100%" stop-color="#123d55"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5fdcff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5fdcff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#5fdcff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172a49"/>
      <stop offset="100%" stop-color="#0c1728"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="210" cy="180" r="130" fill="#2a7bff" opacity="0.12"/>
  <circle cx="1380" cy="160" r="150" fill="#48e0ff" opacity="0.10"/>
  <circle cx="1260" cy="740" r="190" fill="#2de2a0" opacity="0.08"/>
  <path d="M0 620 C 240 560, 420 700, 640 640 S 1100 590, 1600 670 L 1600 900 L 0 900 Z" fill="#07101d" opacity="0.7"/>

  <rect x="100" y="110" width="1400" height="680" rx="40" fill="#0d1a2e" opacity="0.8" stroke="#35507a" stroke-opacity="0.55"/>
  <rect x="130" y="140" width="1340" height="92" rx="22" fill="url(#glow)"/>

  <text x="170" y="270" fill="#ffffff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="70" font-weight="700">Hermes 客製化工作流</text>
  <text x="170" y="332" fill="#b6d6ff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="30">把看板規則、更新回灌與發佈流程一起收緊，讓修改不再輕易遺失</text>

  <g filter="url(#shadow)">
    <rect x="170" y="390" width="490" height="310" rx="26" fill="url(#panel)" stroke="#324d77" stroke-width="2"/>
    <rect x="200" y="422" width="430" height="40" rx="14" fill="#18283f"/>
    <rect x="200" y="486" width="126" height="176" rx="18" fill="#17355c"/>
    <rect x="346" y="486" width="126" height="176" rx="18" fill="#16314f"/>
    <rect x="492" y="486" width="118" height="176" rx="18" fill="#132841"/>

    <rect x="218" y="510" width="88" height="18" rx="9" fill="#53e3ff"/>
    <rect x="218" y="544" width="92" height="14" rx="7" fill="#89b9e7" opacity="0.92"/>
    <rect x="218" y="572" width="70" height="14" rx="7" fill="#89b9e7" opacity="0.76"/>

    <rect x="364" y="510" width="88" height="18" rx="9" fill="#4be39a"/>
    <rect x="364" y="544" width="96" height="14" rx="7" fill="#89b9e7" opacity="0.92"/>
    <rect x="364" y="572" width="64" height="14" rx="7" fill="#89b9e7" opacity="0.76"/>

    <rect x="510" y="510" width="88" height="18" rx="9" fill="#ffd166"/>
    <rect x="510" y="544" width="90" height="14" rx="7" fill="#89b9e7" opacity="0.92"/>
    <rect x="510" y="572" width="80" height="14" rx="7" fill="#89b9e7" opacity="0.76"/>

    <text x="220" y="470" fill="#dcecff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">Kanban</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="724" y="408" width="172" height="206" rx="26" fill="#132340" stroke="#32507c" stroke-width="2"/>
    <rect x="742" y="436" width="136" height="22" rx="11" fill="#53e3ff"/>
    <rect x="742" y="478" width="112" height="16" rx="8" fill="#9bc1e8"/>
    <rect x="742" y="512" width="92" height="16" rx="8" fill="#9bc1e8" opacity="0.8"/>
    <rect x="742" y="548" width="124" height="16" rx="8" fill="#4be39a"/>
    <rect x="742" y="584" width="104" height="16" rx="8" fill="#ffd166"/>
    <text x="810" y="638" text-anchor="middle" fill="#dcecff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">更新</text>
  </g>

  <g stroke="#63e8ff" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M660 540 C 690 540, 700 540, 724 540"/>
    <path d="M724 540 l-18 -12"/>
    <path d="M724 540 l-18 12"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="982" y="390" width="498" height="310" rx="28" fill="#111d33" stroke="#395a8c" stroke-width="2"/>
    <rect x="1010" y="422" width="430" height="40" rx="14" fill="#18283f"/>
    <rect x="1010" y="486" width="150" height="176" rx="18" fill="#17365b"/>
    <rect x="1176" y="486" width="150" height="176" rx="18" fill="#17365b"/>
    <rect x="1342" y="486" width="70" height="176" rx="18" fill="#132841"/>

    <rect x="1030" y="512" width="100" height="18" rx="9" fill="#4be39a"/>
    <rect x="1030" y="548" width="106" height="14" rx="7" fill="#9bc1e8"/>
    <rect x="1030" y="576" width="78" height="14" rx="7" fill="#9bc1e8" opacity="0.76"/>

    <rect x="1196" y="512" width="100" height="18" rx="9" fill="#ffd166"/>
    <rect x="1196" y="548" width="106" height="14" rx="7" fill="#9bc1e8"/>
    <rect x="1196" y="576" width="78" height="14" rx="7" fill="#9bc1e8" opacity="0.76"/>

    <circle cx="1377" cy="540" r="26" fill="#2e7bff"/>
    <path d="M1364 540 h26" stroke="#dff7ff" stroke-width="5"/>
    <path d="M1377 527 v26" stroke="#dff7ff" stroke-width="5"/>
    <text x="1206" y="470" fill="#dcecff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">備份分支</text>
  </g>

  <g stroke="#63e8ff" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M898 540 C 930 540, 950 540, 982 540"/>
    <path d="M982 540 l-18 -12"/>
    <path d="M982 540 l-18 12"/>
  </g>

  <text x="170" y="782" fill="#8fb5da" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">工作流：本地修改 → 備份分支 → hermes update → 回灌合併 → 測試 → 發佈</text>
</svg>
