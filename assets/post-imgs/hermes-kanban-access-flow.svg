<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Dashboard mobile access flow</title>
  <desc id="desc">手機透過 Tailscale 私人網路連到 VPS 上的 Hermes Dashboard 示意圖。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="100%" stop-color="#0d2440"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162845"/>
      <stop offset="100%" stop-color="#0c1728"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ad3ff"/>
      <stop offset="100%" stop-color="#66f2b7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#73e8ff"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="240" cy="180" r="120" fill="#2f8bff" opacity="0.10"/>
  <circle cx="1360" cy="170" r="130" fill="#66f2b7" opacity="0.09"/>
  <circle cx="1270" cy="760" r="170" fill="#3ad3ff" opacity="0.08"/>

  <text x="100" y="110" fill="#ffffff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="54" font-weight="700">安全的手機存取路徑</text>
  <text x="100" y="160" fill="#b5cde8" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="24">不要把 Dashboard 直接暴露到公網；讓手機走 Tailscale 私人網路就好</text>

  <g filter="url(#shadow)">
    <rect x="90" y="250" width="320" height="470" rx="30" fill="url(#panel)" stroke="#33547f" stroke-width="2"/>
    <text x="250" y="305" text-anchor="middle" fill="#dff7ff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="30" font-weight="700">手機</text>
    <rect x="160" y="340" width="180" height="290" rx="30" fill="#0f233f" stroke="#5fbdf3" stroke-width="3"/>
    <rect x="180" y="368" width="140" height="14" rx="7" fill="#dff7ff" opacity="0.85"/>
    <rect x="180" y="400" width="95" height="14" rx="7" fill="#5af0b1"/>
    <rect x="180" y="442" width="140" height="54" rx="14" fill="#17375d"/>
    <rect x="180" y="510" width="140" height="54" rx="14" fill="#17375d"/>
    <rect x="180" y="578" width="140" height="34" rx="14" fill="#17375d"/>
    <text x="250" y="445" text-anchor="middle" fill="#dff7ff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="18">瀏覽器</text>
    <text x="250" y="478" text-anchor="middle" fill="#b5cde8" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="16">Kanban</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="300" width="220" height="370" rx="28" fill="#10233f" stroke="#33547f" stroke-width="2"/>
    <circle cx="560" cy="385" r="62" fill="#1f6ef3"/>
    <path d="M560 337 L598 385 L560 433 L522 385 Z" fill="#dff7ff" opacity="0.95"/>
    <rect x="500" y="470" width="120" height="16" rx="8" fill="#5af0b1"/>
    <rect x="482" y="508" width="156" height="14" rx="7" fill="#93b7dd" opacity="0.85"/>
    <rect x="482" y="538" width="120" height="14" rx="7" fill="#93b7dd" opacity="0.65"/>
    <text x="560" y="611" text-anchor="middle" fill="#dff7ff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="30" font-weight="700">Tailscale</text>
  </g>

  <g stroke="url(#accent)" stroke-width="7" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M410 485 C 440 485, 430 485, 448 485"/>
    <path d="M670 485 C 770 485, 850 485, 940 485"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="250" width="560" height="470" rx="30" fill="url(#panel)" stroke="#33547f" stroke-width="2"/>
    <text x="1230" y="305" text-anchor="middle" fill="#dff7ff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="30" font-weight="700">VPS / Hermes Dashboard</text>
    <rect x="995" y="340" width="260" height="300" rx="24" fill="#0f1f35" stroke="#31517a" stroke-width="2"/>
    <rect x="1020" y="370" width="210" height="28" rx="10" fill="#17365b"/>
    <rect x="1020" y="420" width="76" height="180" rx="16" fill="#17365b"/>
    <rect x="1107" y="420" width="76" height="180" rx="16" fill="#14314f"/>
    <rect x="1194" y="420" width="36" height="180" rx="16" fill="#13253d"/>
    <rect x="1036" y="446" width="44" height="14" rx="7" fill="#5af0b1"/>
    <rect x="1036" y="478" width="48" height="12" rx="6" fill="#93b7dd"/>
    <rect x="1036" y="500" width="40" height="12" rx="6" fill="#93b7dd" opacity="0.75"/>
    <rect x="1123" y="446" width="44" height="14" rx="7" fill="#3ad3ff"/>
    <rect x="1123" y="478" width="48" height="12" rx="6" fill="#93b7dd"/>
    <rect x="1123" y="500" width="40" height="12" rx="6" fill="#93b7dd" opacity="0.75"/>
    <text x="1230" y="680" text-anchor="middle" fill="#b5cde8" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">Dashboard 綁在 localhost</text>
    <text x="1230" y="712" text-anchor="middle" fill="#b5cde8" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">只透過私有網路進來</text>
  </g>

  <text x="100" y="790" fill="#8fb5da" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">先讓手機加入同一個 tailnet，再開啟 Dashboard 的 Kanban 分頁。</text>
</svg>
