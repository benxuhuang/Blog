<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Kanban × Tailscale</title>
  <desc id="desc">封面插圖：筆電、手機、私人網路與看板卡片的安全連線示意。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081225"/>
      <stop offset="55%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#123f57"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39d3ff" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#39d3ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#39d3ff" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17345b"/>
      <stop offset="100%" stop-color="#0c1b32"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6ef3"/>
      <stop offset="100%" stop-color="#8ad6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="240" cy="160" r="110" fill="#2e82ff" opacity="0.14"/>
  <circle cx="1380" cy="180" r="140" fill="#43d9ff" opacity="0.10"/>
  <circle cx="1260" cy="760" r="180" fill="#2ee6a6" opacity="0.08"/>
  <path d="M0 640 C 240 580, 420 700, 640 640 S 1100 580, 1600 660 L 1600 900 L 0 900 Z" fill="#07101e" opacity="0.65"/>

  <rect x="120" y="120" width="1360" height="660" rx="36" fill="#0d1a30" opacity="0.76" stroke="#35507a" stroke-opacity="0.5"/>
  <rect x="150" y="150" width="1300" height="90" rx="22" fill="url(#glow)" opacity="0.9"/>

  <text x="190" y="260" fill="#ffffff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="72" font-weight="700">Hermes Kanban</text>
  <text x="190" y="325" fill="#b8d7ff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="30">把看板放進手機，還是保有私人網路的安全感</text>

  <g filter="url(#shadow)">
    <rect x="190" y="390" width="520" height="300" rx="24" fill="#111f35" stroke="#2d4e7a" stroke-width="2"/>
    <rect x="220" y="420" width="460" height="42" rx="14" fill="#182a46"/>
    <rect x="220" y="482" width="140" height="180" rx="18" fill="#17365b"/>
    <rect x="374" y="482" width="140" height="180" rx="18" fill="#16324f"/>
    <rect x="528" y="482" width="142" height="180" rx="18" fill="#142945"/>
    <rect x="238" y="508" width="104" height="18" rx="9" fill="#53e3ff"/>
    <rect x="238" y="544" width="116" height="14" rx="7" fill="#8db7e3" opacity="0.9"/>
    <rect x="238" y="570" width="88" height="14" rx="7" fill="#8db7e3" opacity="0.75"/>
    <rect x="392" y="508" width="104" height="18" rx="9" fill="#4be39a"/>
    <rect x="392" y="544" width="108" height="14" rx="7" fill="#8db7e3" opacity="0.9"/>
    <rect x="392" y="570" width="72" height="14" rx="7" fill="#8db7e3" opacity="0.75"/>
    <rect x="546" y="508" width="104" height="18" rx="9" fill="#ffd166"/>
    <rect x="546" y="544" width="110" height="14" rx="7" fill="#8db7e3" opacity="0.9"/>
    <rect x="546" y="570" width="96" height="14" rx="7" fill="#8db7e3" opacity="0.75"/>
    <text x="240" y="468" fill="#d8ecff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">Kanban</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="300" width="190" height="390" rx="38" fill="#0f1d33" stroke="#35507a" stroke-width="2"/>
    <rect x="1090" y="330" width="150" height="280" rx="20" fill="url(#phone)"/>
    <rect x="1118" y="365" width="94" height="14" rx="7" fill="#e7f7ff" opacity="0.92"/>
    <rect x="1118" y="396" width="96" height="14" rx="7" fill="#e7f7ff" opacity="0.72"/>
    <rect x="1118" y="438" width="110" height="78" rx="16" fill="#0d2342" opacity="0.75"/>
    <rect x="1118" y="531" width="110" height="78" rx="16" fill="#0d2342" opacity="0.55"/>
    <circle cx="1165" cy="650" r="11" fill="#7df4d2"/>
  </g>

  <g stroke="#65e8ff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M730 560 C 820 560, 870 560, 960 560"/>
    <path d="M960 560 l-18 -13"/>
    <path d="M960 560 l-18 13"/>
  </g>

  <g>
    <rect x="770" y="455" width="190" height="210" rx="28" fill="#122747" stroke="#3a5b8d" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="865" cy="508" r="36" fill="#1f6ef3" opacity="0.95"/>
    <circle cx="865" cy="508" r="16" fill="#dff7ff" opacity="0.95"/>
    <path d="M840 560 h50 v10 h-50 z" fill="#68dbff"/>
    <path d="M828 598 h74 v10 h-74 z" fill="#4be39a"/>
    <path d="M818 632 h94 v10 h-94 z" fill="#ffd166"/>
    <text x="865" y="688" text-anchor="middle" fill="#dff7ff" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="24">Tailscale</text>
  </g>

  <text x="190" y="782" fill="#8fb5da" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="22">Hermes Dashboard 以 localhost 運作，手機只走私人網路連進來</text>
</svg>
